<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. Bugeon의 USMLE 오답노트</title>
  <!--
    Dr. Bugeon의 USMLE 오답노트 — v3
    · Supabase 클라우드 동기화 (updated_at 병합 + 최종본 버전)
    · AI 자동완성 (Claude 내장 / OpenAI / Anthropic / Gemini)
    · localStorage + IndexedDB 마이그레이션
    · JSON 백업 export/import  ·  Excel export
    · GitHub Pages: index.html 로 배포

    Supabase 테이블 설정은 앱 화면에 넣지 않고 별도 SQL 안내 문서로 관리한다.
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f0f4f8;
      min-height: 100vh;
      padding: 20px 24px;
    }
    #root { width: min(100%, 1160px); margin: 0 auto; }
    @media (max-width: 720px) {
      body { padding: 10px; }
    }
    /* ── input focus & placeholder ── */
    input:focus, textarea:focus, select:focus {
      outline: none !important;
      border-color: rgba(249,115,22,0.6) !important;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.10) !important;
    }
    input::placeholder, textarea::placeholder { color: #a0aec0; opacity:1; }
    select option { background: #fff; color: #1e293b; }
    #confirm-overlay {
      display:none; position:fixed; inset:0; background:rgba(15,22,35,.55);
      z-index:9999; align-items:center; justify-content:center;
    }
    #confirm-overlay.open { display:flex; }
    #confirm-box {
      background:#ffffff; border:1px solid rgba(0,0,0,.10);
      border-radius:16px; padding:30px 26px; max-width:360px; width:90%;
      font-family: ui-sans-serif, system-ui, sans-serif;
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
    }
    #confirm-msg { color:#1e293b; font-size:15px; line-height:1.65; margin-bottom:22px; }
    #confirm-btns { display:flex; gap:10px; }
    #confirm-btns button { flex:1; border-radius:10px; padding:12px; font-size:14px;
      font-weight:700; cursor:pointer; border:none; font-family:inherit; }
    #confirm-ok  { background:#f97316; color:#fff; }
    #confirm-can { background:#f1f5f9; color:#64748b;
      border:1px solid rgba(0,0,0,.10) !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Confirm dialog (vanilla) -->
  <div id="confirm-overlay">
    <div id="confirm-box">
      <div id="confirm-msg"></div>
      <div id="confirm-btns">
        <button id="confirm-ok">확인</button>
        <button id="confirm-can">취소</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       UTILITY FUNCTIONS  (vanilla JS, accessible globally)
       ============================================================ -->
  <script>
    /* ── Storage keys ── */
    const STORE_KEY  = 'usmle_cards_v1';
    const SB_CFG_KEY = 'usmle_supa_cfg';
    const AI_CFG_KEY = 'usmle_ai_cfg';
    const SYNC_META_KEY = 'usmle_sync_meta_v1';
    const TOMBSTONE_KEY = 'usmle_deleted_tombstones_v1';
    const CARD_TABLE = 'usmle_cards';
    const SYNC_META_TABLE = 'language_sync_meta';

    const nowIso = () => new Date().toISOString();
    const canonicalStamp = () => `${nowIso()}-${Math.random().toString(36).slice(2, 10)}`;
    const toMs = v => {
      const ms = Date.parse(v || '');
      return Number.isFinite(ms) ? ms : 0;
    };
    function ensureCardMeta(card, fallbackIso = nowIso()) {
      const created = card.created_at || card.createdAt || card.updated_at || card.updatedAt || fallbackIso;
      const updated = card.updated_at || card.updatedAt || created || fallbackIso;
      const deleted = card.deleted_at || card.deletedAt || null;
      const clean = {
        ...card,
        id: String(card.id || '').trim(),
        created_at: created,
        updated_at: updated
      };
      delete clean.createdAt;
      delete clean.updatedAt;
      delete clean.deletedAt;
      if (!clean.wrongReason && clean.content_kr) clean.wrongReason = clean.content_kr;
      delete clean.content_kr;
      delete clean.content_en;
      clean.stem = textOf(clean.stem);
      clean.correct = textOf(clean.correct);
      clean.myAnswer = textOf(clean.myAnswer);
      clean.errorType = getErrorType(clean.errorType).id;
      clean.system = systemOf(clean);
      if (!Array.isArray(clean.buzzword)) clean.buzzword = textOf(clean.buzzword).split(',').map(s => s.trim()).filter(Boolean);
      if (deleted) clean.deleted_at = deleted; else delete clean.deleted_at;
      return clean;
    }
    function touchCard(card, changes = {}) {
      const base = ensureCardMeta(card);
      const stamp = nowIso();
      return {
        ...base,
        ...changes,
        created_at: base.created_at || stamp,
        updated_at: stamp
      };
    }
    function normalizeCards(cards, { includeDeleted = false } = {}) {
      const byId = new Map();
      (Array.isArray(cards) ? cards : []).forEach(card => {
        if (!card || typeof card !== 'object' || !card.id) return;
        const clean = ensureCardMeta(card);
        const prev = byId.get(clean.id);
        if (!prev || toMs(clean.updated_at) >= toMs(prev.updated_at)) byId.set(clean.id, clean);
      });
      return Array.from(byId.values())
        .filter(card => includeDeleted || !card.deleted_at)
        .sort((a, b) => toMs(b.updated_at) - toMs(a.updated_at));
    }
    function mergeByUpdatedAt(localCards, cloudCards, { includeDeleted = false } = {}) {
      const merged = new Map();
      [...normalizeCards(localCards, { includeDeleted: true }), ...normalizeCards(cloudCards, { includeDeleted: true })]
        .forEach(card => {
          const prev = merged.get(card.id);
          if (!prev || toMs(card.updated_at) >= toMs(prev.updated_at)) merged.set(card.id, card);
        });
      return normalizeCards(Array.from(merged.values()), { includeDeleted });
    }
    function makeTombstone(id, existing = null) {
      const stamp = nowIso();
      const base = existing ? ensureCardMeta(existing) : { id, created_at: stamp };
      return {
        ...base,
        id,
        created_at: base.created_at || stamp,
        updated_at: stamp,
        deleted_at: stamp
      };
    }
    function getLocalSyncMeta() {
      try { return JSON.parse(localStorage.getItem(SYNC_META_KEY)) || {}; } catch { return {}; }
    }
    function saveLocalSyncMeta(meta) {
      localStorage.setItem(SYNC_META_KEY, JSON.stringify({
        ...getLocalSyncMeta(),
        ...meta,
        checked_at: nowIso()
      }));
    }
    function loadLocalTombstones() {
      try {
        const raw = JSON.parse(localStorage.getItem(TOMBSTONE_KEY)) || [];
        return normalizeCards(raw, { includeDeleted: true }).filter(card => card.deleted_at);
      } catch { return []; }
    }
    function saveLocalTombstones(tombstones) {
      const clean = normalizeCards(tombstones, { includeDeleted: true }).filter(card => card.deleted_at);
      localStorage.setItem(TOMBSTONE_KEY, JSON.stringify(clean));
      return clean;
    }
    function addLocalTombstone(id, existing = null) {
      const tombstone = makeTombstone(id, existing);
      saveLocalTombstones([...loadLocalTombstones().filter(card => card.id !== id), tombstone]);
      return tombstone;
    }
    function addLocalTombstones(cards) {
      const tombstones = (Array.isArray(cards) ? cards : []).map(card => makeTombstone(card.id, card));
      saveLocalTombstones([...loadLocalTombstones(), ...tombstones]);
      return tombstones;
    }

    /* ── localStorage helpers ── */
    function loadStore() {
      try { const v = localStorage.getItem(STORE_KEY); return v ? JSON.parse(v) : null; }
      catch { return null; }
    }
    function saveStore(cards) {
      const clean = normalizeCards(cards);
      try {
        localStorage.setItem(STORE_KEY, JSON.stringify(clean));
      } catch(e) {
        // 용량 초과 또는 저장 불가 — 사용자에게 즉시 알림
        console.error('localStorage save failed:', e);
        showGlobalToast('⚠️ 저장 실패: 브라우저 저장공간 부족 또는 개인정보 보호 모드');
      }
      return clean;
    }

    /* ── Migrate from IndexedDB (one-time, v1 users) ── */
    async function migrateFromIDB() {
      try {
        return await Promise.race([
          new Promise(resolve => {
            const req = indexedDB.open('usmle_notebook', 1);
            req.onupgradeneeded = () => resolve(null); // DB가 없었음 → 마이그레이션 불필요
            req.onblocked       = () => resolve(null);
            req.onerror         = () => resolve(null);
            req.onsuccess = e => {
              const db = e.target.result;
              if (!db.objectStoreNames.contains('kv')) { resolve(null); return; }
              try {
                const r = db.transaction('kv','readonly').objectStore('kv').get('cards');
                r.onsuccess = () => {
                  try { resolve(r.result ? JSON.parse(r.result) : null); }
                  catch { resolve(null); }
                };
                r.onerror   = () => resolve(null);
              } catch { resolve(null); }
            };
          }),
          new Promise(resolve => setTimeout(() => resolve(null), 800)) // 최대 800ms 대기
        ]);
      } catch { return null; }
    }

    /* ── Supabase ── */
    function getSbCfg() {
      try { return JSON.parse(localStorage.getItem(SB_CFG_KEY)); } catch { return null; }
    }
    function saveSbCfg(url, key) {
      localStorage.setItem(SB_CFG_KEY, JSON.stringify({ url: url.replace(/\/$/, ''), key }));
    }
    function sbHdrs(extra = {}) {
      const cfg = getSbCfg();
      if (!cfg) return {};
      return {
        'Content-Type': 'application/json',
        'apikey': cfg.key,
        'Authorization': `Bearer ${cfg.key}`,
        ...extra
      };
    }
    function cardToRow(card) {
      const clean = ensureCardMeta(card);
      return {
        id: clean.id,
        created_at: clean.created_at,
        updated_at: clean.updated_at,
        deleted_at: clean.deleted_at || null,
        data: JSON.stringify(clean)
      };
    }
    async function sbUpsertRows(rows) {
      const cfg = getSbCfg(); if (!cfg || rows.length === 0) return 0;
      const res = await fetch(`${cfg.url}/rest/v1/${CARD_TABLE}`, {
        method: 'POST',
        headers: sbHdrs({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
        body: JSON.stringify(rows)
      });
      if (!res.ok) throw new Error(`Upsert 실패: ${res.status} — ${await res.text()}`);
      return rows.length;
    }
    async function sbGetMeta(key) {
      const cfg = getSbCfg(); if (!cfg) return null;
      const res = await fetch(
        `${cfg.url}/rest/v1/${SYNC_META_TABLE}?select=value,updated_at&key=eq.${encodeURIComponent(key)}&limit=1`,
        { headers: sbHdrs() }
      );
      if (!res.ok) throw new Error(`메타 테이블 확인 실패: ${res.status} — ${await res.text()}`);
      const rows = await res.json();
      return rows[0]?.value || null;
    }
    async function sbSetMeta(key, value) {
      const cfg = getSbCfg(); if (!cfg) return value;
      const res = await fetch(`${cfg.url}/rest/v1/${SYNC_META_TABLE}`, {
        method: 'POST',
        headers: sbHdrs({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
        body: JSON.stringify({ key, value, updated_at: nowIso() })
      });
      if (!res.ok) throw new Error(`메타 저장 실패: ${res.status} — ${await res.text()}`);
      return value;
    }
    async function sbUpsert(card) {
      const cfg = getSbCfg(); if (!cfg) return;
      await sbUpsertRows([cardToRow(card)]);
    }
    async function sbDelete(id) {
      const cfg = getSbCfg(); if (!cfg) return;
      const tombstone = addLocalTombstone(id);
      await sbUpsertRows([cardToRow(tombstone)]);
    }
    async function sbLoadAll({ includeDeleted = false } = {}) {
      const cfg = getSbCfg(); if (!cfg) return null;
      const res = await fetch(
        `${cfg.url}/rest/v1/${CARD_TABLE}?select=id,created_at,updated_at,deleted_at,data&order=updated_at.desc&limit=5000`,
        { headers: sbHdrs() }
      );
      if (!res.ok) throw new Error(`Supabase ${res.status}: ${await res.text()}`);
      const rows = await res.json();
      return normalizeCards(rows.map(row => {
        let data = {};
        try { data = row.data ? JSON.parse(row.data) : {}; } catch { data = {}; }
        return {
          ...data,
          id: row.id || data.id,
          created_at: row.created_at || data.created_at,
          updated_at: row.updated_at || data.updated_at,
          deleted_at: row.deleted_at || data.deleted_at || null
        };
      }), { includeDeleted });
    }
    async function sbPushAll(cards, { canonical = false } = {}) {
      const cfg = getSbCfg(); if (!cfg) return 0;
      const clean = normalizeCards(cards);
      await sbUpsertRows(clean.map(cardToRow));
      if (canonical) {
        const keep = new Set(clean.map(card => card.id));
        const cloudAll = await sbLoadAll({ includeDeleted: true }) || [];
        const tombstones = cloudAll
          .filter(card => !card.deleted_at && !keep.has(card.id))
          .map(card => cardToRow(makeTombstone(card.id, card)));
        await sbUpsertRows(tombstones);
        saveLocalTombstones(tombstones.map(row => JSON.parse(row.data)));
        const version = await sbSetMeta('canonical_version', canonicalStamp());
        saveLocalSyncMeta({ canonical_version: version, last_sync_mode: 'canonical_push' });
      }
      return clean.length;
    }
    async function sbTest() {
      const cfg = getSbCfg(); if (!cfg) throw new Error('미설정');
      const res = await fetch(
        `${cfg.url}/rest/v1/${CARD_TABLE}?select=id&limit=1`,
        { headers: sbHdrs() }
      );
      if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
      const meta = await fetch(
        `${cfg.url}/rest/v1/${SYNC_META_TABLE}?select=key&limit=1`,
        { headers: sbHdrs() }
      );
      if (!meta.ok) throw new Error(`language_sync_meta 필요: ${meta.status}: ${await meta.text()}`);
      return true;
    }
    async function sbAutoSync(localCards) {
      const cloudVersion = await sbGetMeta('canonical_version');
      const localMeta = getLocalSyncMeta();
      const cloudCards = await sbLoadAll({ includeDeleted: true }) || [];
      if (cloudVersion && cloudVersion !== localMeta.canonical_version) {
        const cloudVisible = normalizeCards(cloudCards);
        saveLocalTombstones(cloudCards.filter(card => card.deleted_at));
        saveLocalSyncMeta({ canonical_version: cloudVersion, last_sync_mode: 'canonical_pull' });
        return { cards: cloudVisible, mode: 'canonical_pull', count: cloudVisible.length };
      }
      const localAll = normalizeCards([...localCards, ...loadLocalTombstones()], { includeDeleted: true });
      const mergedAll = mergeByUpdatedAt(localAll, cloudCards, { includeDeleted: true });
      const mergedVisible = normalizeCards(mergedAll);
      await sbUpsertRows(mergedAll.map(cardToRow));
      saveLocalTombstones(mergedAll.filter(card => card.deleted_at));
      if (cloudVersion) saveLocalSyncMeta({ canonical_version: cloudVersion, last_sync_mode: 'merge' });
      return { cards: mergedVisible, mode: 'merge', count: mergedVisible.length };
    }
    function cloudSave(card) {
      if (!getSbCfg()) return;
      sbUpsert(card).catch(e => console.warn('Cloud save failed:', e.message));
    }
    function cloudDel(id) {
      if (!getSbCfg()) return;
      sbDelete(id).catch(e => console.warn('Cloud delete failed:', e.message));
    }

    /* ── AI ── */
    function isClaudeEnv() {
      try {
        return window.location.hostname.includes('claude.ai') ||
               window.location.hostname.includes('anthropic.com');
      } catch { return false; }
    }
    async function callClaudeBuiltin(prompt, maxTokens = 1000) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: maxTokens,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      if (!res.ok) throw new Error(`Claude ${res.status}`);
      const d = await res.json();
      return d.content?.map(c => c.text || '').join('\n') || '';
    }
    function getAICfg() {
      try { return JSON.parse(localStorage.getItem(AI_CFG_KEY)) || {}; }
      catch { return {}; }
    }
    function saveAICfg(cfg) {
      localStorage.setItem(AI_CFG_KEY, JSON.stringify(cfg));
    }
    async function callAI(prompt, maxTokens = 1000) {
      if (isClaudeEnv()) {
        for (let i = 0; i < 3; i++) {
          try { return await callClaudeBuiltin(prompt, maxTokens); }
          catch(e) {
            if ((e.message.includes('529') || e.message.includes('overloaded')) && i < 2) {
              await new Promise(r => setTimeout(r, (i + 1) * 1500));
              continue;
            }
            break;
          }
        }
      }
      const cfg = getAICfg();
      if (cfg.anthropicKey) {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': cfg.anthropicKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: cfg.modelAnthropic || 'claude-sonnet-4-6',
            max_tokens: maxTokens,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        if (!res.ok) throw new Error(`Anthropic ${res.status}`);
        const d = await res.json();
        return d.content?.map(c => c.text || '').join('\n') || '';
      }
      if (cfg.geminiKey) {
        const model = cfg.modelGemini || 'gemini-2.0-flash';
        const res = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${cfg.geminiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { maxOutputTokens: maxTokens }
            })
          }
        );
        if (!res.ok) throw new Error(`Gemini ${res.status}`);
        const d = await res.json();
        return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
      }
      if (cfg.openaiKey) {
        const res = await fetch('https://api.openai.com/v1/responses', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.openaiKey}` },
          body: JSON.stringify({
            model: cfg.modelOpenAI || 'gpt-4o-mini',
            input: prompt,
            max_output_tokens: maxTokens
          })
        });
        if (!res.ok) throw new Error(`OpenAI ${res.status}`);
        const d = await res.json();
        if (d.output_text) return d.output_text;
        return (d.output || []).flatMap(i => i.content || []).map(c => c.text || '').join('\n');
      }
      throw new Error('AI API 미설정. 우측 상단 설정 버튼에서 API 키를 입력해주세요.');
    }
    async function aiEnrichCard(stem, correct, myAnswer) {
      const prompt = `You are a USMLE Step 1/Step 2 CK expert. Given this wrong-answer card:
Correct answer: ${correct}
My wrong answer: ${myAnswer || '(not specified)'}
Stem/trigger: ${stem}

Generate concise USMLE-style content. Respond ONLY with valid JSON (no markdown, no extra text):
{
  "pathophys": "1-2 line mechanism using up/down arrows (↑↓)",
  "trap": "why a student would pick the wrong answer instead of correct one",
  "wrongReason": "한국어 1-2문장. 내가 고른 오답이 왜 틀렸고 정답과 어떤 결정적 차이가 있는지 설명",
  "nextCue": "다음에 이 문제를 맞히기 위한 한 줄 단서. 예: 고Ca뇨 + loop 부위 + furosemide mimic = Bartter",
  "buzzword": "comma-separated 2-4 USMLE buzzwords"
}`;
      const raw = await callAI(prompt, 900);
      const clean = raw.replace(/```json\s*|\s*```/g, '').trim();
      const s = clean.indexOf('{'), e = clean.lastIndexOf('}');
      if (s === -1 || e === -1) throw new Error('AI 응답 파싱 실패: JSON을 찾을 수 없음');
      return JSON.parse(clean.slice(s, e + 1));
    }

    function exportJSON(cards) {
      const json = JSON.stringify({ version: 2, exported: new Date().toISOString(), count: cards.length, cards }, null, 2);
      _download(new Blob([json], { type: 'application/json' }), 'usmle_backup.json');
    }
    function exportExcel(cards) {
      const rows = cards.map(c => ({
        'Stem': c.stem, 'My Answer': c.myAnswer, 'Correct': c.correct,
        'Error Type': c.errorType, 'System': c.system,
        '기전': c.pathophys, '함정': c.trap,
        '오답인 이유': wrongReasonOf(c), '다음 단서': nextCueOf(c),
        'Buzzword': (c.buzzword || []).join(', '),
        'Source': c.source, 'Confidence': c.confidence,
        'SRS Interval': c.srs?.interval || 0, 'Due Date': c.srs?.dueDate || '',
      }));
      const ws = XLSX.utils.json_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'USMLE Cards');
      XLSX.writeFile(wb, 'usmle_cards.xlsx');
    }
    function _download(blob, name) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = name; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    /* ── Confirm dialog ── */
    function showConfirm(msg, onOk, onCancel) {
      document.getElementById('confirm-msg').innerHTML = msg;
      const ov = document.getElementById('confirm-overlay');
      const ok = document.getElementById('confirm-ok');
      const can = document.getElementById('confirm-can');
      ov.classList.add('open');
      const close = () => ov.classList.remove('open');
      ok.onclick  = () => { close(); onOk && onOk(); };
      can.onclick = () => { close(); onCancel && onCancel(); };
    }

    /* ── Toast ── */
    function showGlobalToast(msg) {
      let el = document.getElementById('g-toast');
      if (!el) {
        el = document.createElement('div');
