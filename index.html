<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USMLE 오답 인출 노트</title>
  <!--
    ┌─────────────────────────────────────────────────────────┐
    │  USMLE 오답 인출 노트  — standalone HTML                │
    │  단일 파일, 빌드 불필요. 브라우저에서 바로 열기.          │
    │  데이터: IndexedDB (오프라인 영구 저장)                  │
    │  GitHub Pages: index.html 로 저장 후 gh-pages 배포 가능 │
    └─────────────────────────────────────────────────────────┘
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0e0c0a; min-height: 100vh; padding: 16px; }
    #root { max-width: 860px; margin: 0 auto; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    /* ============================================================
       USMLE 오답노트 — v1  (standalone HTML build)
       인출 루프: Capture → Cue-only → Active recall → Tag → SRS
       ============================================================ */

    /* ---------- IndexedDB persistence ---------- */
    const DB_NAME    = "usmle_notebook";
    const DB_VERSION = 1;
    const STORE_NAME = "kv";

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME))
            db.createObjectStore(STORE_NAME);
        };
        req.onsuccess  = (e) => resolve(e.target.result);
        req.onerror    = ()  => reject(new Error("DB open failed"));
      });
    }

    async function loadStore() {
      try {
        const db = await openDB();
        return new Promise((resolve) => {
          const req = db.transaction(STORE_NAME, "readonly")
                        .objectStore(STORE_NAME).get("cards");
          req.onsuccess = () => resolve(req.result ? JSON.parse(req.result) : null);
          req.onerror   = () => resolve(null);
        });
      } catch (e) { return null; }
    }

    async function saveStore(cards) {
      try {
        const db = await openDB();
        return new Promise((resolve) => {
          const tx = db.transaction(STORE_NAME, "readwrite");
          tx.objectStore(STORE_NAME).put(JSON.stringify(cards), "cards");
          tx.oncomplete = resolve;
          tx.onerror    = resolve;
        });
      } catch (e) {}
    }

    /* ---------- constants ---------- */
    const ERROR_TYPES = [
      { id: "KNOWLEDGE", kr: "지식 부족",  en: "Knowledge", color: "#378ADD" },
      { id: "TRAP",      kr: "함정/오독",  en: "Trap",       color: "#EF9F27" },
      { id: "REASONING", kr: "추론 실패",  en: "Reasoning",  color: "#7F77DD" },
      { id: "RUSH",      kr: "시간 압박",  en: "Rush",       color: "#D85A30" },
      { id: "GUESS",     kr: "추측",       en: "Guess",      color: "#D4537E" },
      { id: "CARELESS",  kr: "부주의",     en: "Careless",   color: "#9a9088" },
    ];
    const ET = Object.fromEntries(ERROR_TYPES.map((e) => [e.id, e]));

    const SYSTEMS = [
      "Renal","Cardio","Pulm","GI","Heme/Onc","Endo","Neuro",
      "MSK","Repro","Immuno","Micro","Pharm","Psych","Biochem","Derm",
    ];

    /* ---------- SM-2 ---------- */
    function schedule(srs, pass) {
      let { interval = 0, ease = 2.5, reps = 0 } = srs || {};
      const q = pass ? 4 : 2;
      if (q < 3) { reps = 0; interval = 1; }
      else {
        if      (reps === 0) interval = 1;
        else if (reps === 1) interval = 6;
        else                 interval = Math.round(interval * ease);
        reps += 1;
      }
      ease = Math.max(1.3, ease + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
      const d = new Date();
      d.setDate(d.getDate() + interval);
      return { interval, ease: +ease.toFixed(2), reps, dueDate: d.toISOString().slice(0, 10) };
    }

    const todayStr  = () => new Date().toISOString().slice(0, 10);
    const isDue     = (c) => !c.srs || !c.srs.dueDate || c.srs.dueDate <= todayStr();
    const uid       = () => Math.random().toString(36).slice(2, 10);

    function interleave(cards) {
      const groups = {};
      cards.forEach((c) => { (groups[c.system] = groups[c.system] || []).push(c); });
      const keys = Object.keys(groups);
      const out = []; let added = true;
      while (added) {
        added = false;
        for (const k of keys) { if (groups[k].length) { out.push(groups[k].shift()); added = true; } }
      }
      return out;
    }

    const shuffle = (arr) => {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };

    /* ---------- seed cards ---------- */
    const SEED = [
      {
        id: uid(),
        stem: "유전성 · 저K⁺ + 대사성 알칼리증 + 정상혈압 + 고Ca²⁺뇨 (loop 부위)",
        myAnswer: "Gitelman syndrome", correct: "Bartter syndrome",
        errorType: "TRAP", system: "Renal",
        pathophys: "NKCC2 ↓ (loop of Henle) → furosemide 만성 복용 흉내 → Na/K/Cl 재흡수 ↓",
        trap: "Gitelman과 혼동 — Gitelman은 저Ca²⁺뇨 + 저Mg²⁺ (DCT, thiazide 흉내)",
        buzzword: ["NKCC2","loop-diuretic mimic","hypercalciuria"],
        source: "UWorld", confidence: 4,
        content_kr: "Bartter = loop(NKCC2) 결함, furosemide 흉내. 고Ca²⁺뇨가 핵심 감별점.",
        content_uz: "Bartter = Genle qovuzlog'ida (NKCC2) nuqson. Giperkalsiuriya — asosiy farq.",
        content_en: "Bartter = NKCC2 defect in loop of Henle (loop-diuretic mimic). Hypercalciuria distinguishes from Gitelman.",
        originalMcq: {
          stemFull: "A 9-year-old has muscle weakness. Labs: K⁺ 2.8, metabolic alkalosis, normal BP, ↑ urine Ca²⁺. The defect is in which transporter?",
          options: ["NKCC2 in the thick ascending limb","NCC in the distal convoluted tubule","ENaC in the collecting duct","Na⁺/K⁺-ATPase","Aquaporin-2"],
          answerIndex: 0,
        },
        srs: null,
      },
      {
        id: uid(),
        stem: "패혈증 후 급성 저산소혈증 + 양측 침윤 + P/F < 300 + 심부전 아님",
        myAnswer: "Cardiogenic pulmonary edema", correct: "ARDS (Berlin criteria)",
        errorType: "REASONING", system: "Pulm",
        pathophys: "폐포-모세혈관막 손상 → 투과성 ↑ → 비심인성 폐부종 + compliance ↓",
        trap: "심인성 폐부종과 감별 — ARDS는 PCWP ≤ 18, 정상 심기능",
        buzzword: ["P/F ratio","bilateral infiltrates","low compliance","Berlin"],
        source: "NBME", confidence: 3,
        content_kr: "ARDS = 비심인성. 폐보호 환기(6 mL/kg) + PEEP. P/F<300.",
        content_uz: "ARDS = nokardiogen. Past hajmli ventilyatsiya (6 mL/kg) + PEEP. P/F<300.",
        content_en: "ARDS = noncardiogenic. Lung-protective ventilation (6 mL/kg) + PEEP. P/F<300.",
        originalMcq: null, srs: null,
      },
      {
        id: uid(),
        stem: "조영제/aminoglycoside 후 AKI + 갈색 과립 원주 + BUN/Cr < 20 + FENa > 2%",
        myAnswer: "Prerenal azotemia", correct: "Acute tubular necrosis (ATN)",
        errorType: "KNOWLEDGE", system: "Renal",
        pathophys: "허혈/신독소 → 근위세관 괴사 → 원주 형성, 농축능 상실",
        trap: "Prerenal과 감별 — prerenal은 BUN/Cr >20, FENa <1%, ↑UOsm",
        buzzword: ["muddy brown casts","FENa >2%","BUN/Cr <20"],
        source: "UWorld", confidence: 2,
        content_kr: "ATN = 세관 괴사. FENa>2%, 갈색 과립 원주. 지지요법.",
        content_uz: "ATN = kanalcha nekrozi. FENa>2%, jigarrang granular silindrlar. Qo'llab-quvvatlovchi davo.",
        content_en: "ATN = tubular necrosis. FENa>2%, muddy-brown casts. Supportive care.",
        originalMcq: null, srs: null,
      },
    ];

    /* ============================================================
       THEME
       ============================================================ */
    const C = {
      bg: "#14110f", panel: "#1c1814", panel2: "#241e18",
      line: "rgba(255,255,255,0.08)", line2: "rgba(255,255,255,0.14)",
      text: "#ece6dd", dim: "#9a9088", faint: "#6f675f",
      amber: "#e0a050", teal: "#3fae8f", red: "#d8624b", green: "#7bb765",
    };

    const globalCss = `
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap');
      .uwn { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
      .uwn ::selection { background: #e0a050; color: #14110f; }
      .serif { font-family: 'Fraunces', Georgia, serif; }
      .uwn button, .uwn input, .uwn textarea, .uwn select { font-family: inherit; }
      .uwn button { cursor: pointer; }
      .uwn textarea { resize: vertical; }
      .tap { transition: transform .12s ease, background .15s ease, border-color .15s ease; }
      .tap:active { transform: scale(.97); }
      .uwn ::-webkit-scrollbar { width: 9px; height: 9px; }
      .uwn ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.13); border-radius: 8px; }
      @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
      .fade { animation: fadeUp .28s ease both; }
    `;

    const field = {
      width: "100%", background: C.bg, color: C.text,
      border: `1px solid ${C.line}`, borderRadius: 8,
      padding: "9px 11px", fontSize: 14, outline: "none",
    };
    const lbl = {
      fontSize: 11, letterSpacing: ".06em", textTransform: "uppercase",
      color: C.dim, marginBottom: 5, display: "block", fontWeight: 600,
    };

    /* ---- shared tiny components ---- */
    function Badge({ children, color }) {
      return (
        <span style={{
          display: "inline-flex", alignItems: "center", gap: 5,
          fontSize: 11.5, fontWeight: 600, padding: "3px 9px", borderRadius: 20,
          color, background: `${color}1f`, border: `1px solid ${color}55`, whiteSpace: "nowrap",
        }}>{children}</span>
      );
    }

    function Row({ k, v, color, strong }) {
      return (
        <div style={{ display:"flex", gap:12, padding:"6px 0", borderBottom:`1px solid ${C.line}` }}>
          <div style={{ width:120, flexShrink:0, fontSize:11.5, color:C.dim, textTransform:"uppercase", letterSpacing:".04em", paddingTop:2 }}>{k}</div>
          <div style={{ fontSize: strong ? 16 : 14, fontWeight: strong ? 600 : 400, color: color || C.text, lineHeight:1.5 }}>{v}</div>
        </div>
      );
    }

    function DetailRow({ k, v, color, strong }) {
      if (!v) return null;
      return (
        <div style={{ display:"flex", gap:12 }}>
          <div style={{ width:56, flexShrink:0, fontSize:11, color:C.faint, textTransform:"uppercase", letterSpacing:".04em", paddingTop:2 }}>{k}</div>
          <div style={{ fontSize: strong ? 15 : 13.5, fontWeight: strong ? 600 : 400, color: color || C.text, lineHeight:1.5 }}>{v}</div>
        </div>
      );
    }

    /* ============================================================
       APP
       ============================================================ */
    function App() {
      const [cards, setCards] = useState(null);
      const [view, setView]   = useState("recall");
      const [toast, setToast] = useState("");

      useEffect(() => {
        (async () => {
          const stored = await loadStore();
          if (stored && Array.isArray(stored)) setCards(stored);
          else { setCards(SEED); saveStore(SEED); }
        })();
      }, []);

      const update = (next) => { setCards(next); saveStore(next); };
      const flash  = (m)    => { setToast(m); setTimeout(() => setToast(""), 1800); };
      const dueCount = useMemo(() => (cards ? cards.filter(isDue).length : 0), [cards]);

      if (cards === null) {
        return (
          <div className="uwn" style={{ background:C.bg, color:C.dim, minHeight:320, display:"flex", alignItems:"center", justifyContent:"center" }}>
            <style>{globalCss}</style>불러오는 중…
          </div>
        );
      }

      const tabs = [
        { id:"capture",   kr:"캡처",    en:"Capture" },
        { id:"recall",    kr:"인출",    en:"Recall",    badge: dueCount },
        { id:"library",   kr:"목록",    en:"Library" },
        { id:"dashboard", kr:"대시보드", en:"Dashboard" },
        { id:"export",    kr:"내보내기", en:"Export" },
      ];

      return (
        <div className="uwn" style={{ background:C.bg, color:C.text, minHeight:600, borderRadius:14, overflow:"hidden", border:`1px solid ${C.line}` }}>
          <style>{globalCss}</style>

          {/* Header */}
          <div style={{ padding:"16px 20px 0", display:"flex", alignItems:"baseline", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
            <div>
              <div className="serif" style={{ fontSize:23, fontWeight:600, letterSpacing:"-.01em" }}>
                오답 인출 노트 <span style={{ color:C.amber }}>·</span>{" "}
                <span style={{ color:C.dim, fontWeight:400, fontSize:15 }}>Retrieval Notebook</span>
              </div>
              <div style={{ fontSize:12, color:C.faint, marginTop:2 }}>Cue-only → active recall → why-wrong tag → SRS</div>
            </div>
            <div style={{ fontSize:12, color:C.dim, textAlign:"right" }}>
              <span style={{ color:C.text, fontWeight:600 }}>{cards.length}</span> cards ·{" "}
              <span style={{ color: dueCount ? C.amber : C.dim, fontWeight:600 }}>{dueCount}</span> due
            </div>
          </div>

          {/* Tabs */}
          <div style={{ display:"flex", gap:4, padding:"12px 16px 0", flexWrap:"wrap" }}>
            {tabs.map((t) => {
              const on = view === t.id;
              return (
                <button key={t.id} className="tap" onClick={() => setView(t.id)}
                  style={{ background: on ? C.panel2 : "transparent", color: on ? C.text : C.dim,
                    border:`1px solid ${on ? C.line2 : "transparent"}`, borderBottom:"none",
                    borderRadius:"9px 9px 0 0", padding:"9px 14px", fontSize:13.5, fontWeight: on ? 600 : 500,
                    display:"flex", alignItems:"center", gap:7 }}>
                  {t.kr}<span style={{ color:C.faint, fontSize:11 }}>{t.en}</span>
                  {t.badge > 0 && <span style={{ background:C.amber, color:"#14110f", borderRadius:10, padding:"0 6px", fontSize:11, fontWeight:700 }}>{t.badge}</span>}
                </button>
              );
            })}
          </div>

          {/* Body */}
          <div style={{ borderTop:`1px solid ${C.line2}`, padding:20, minHeight:420 }}>
            {view === "capture"   && <Capture   cards={cards} update={update} flash={flash} />}
            {view === "recall"    && <Recall    cards={cards} update={update} flash={flash} />}
            {view === "library"   && <Library   cards={cards} update={update} />}
            {view === "dashboard" && <Dashboard cards={cards} />}
            {view === "export"    && <Export    cards={cards} />}
          </div>

          {toast && (
            <div className="fade" style={{ position:"sticky", bottom:16, marginLeft:"auto", marginRight:16, width:"fit-content",
              background:C.teal, color:"#0c1410", fontWeight:600, fontSize:13, padding:"9px 16px", borderRadius:24 }}>
              {toast}
            </div>
          )}
        </div>
      );
    }

    /* ============================================================
       CAPTURE
       ============================================================ */
    const emptyDraft = () => ({
      stem:"", myAnswer:"", correct:"", errorType:"", system:"Renal",
      pathophys:"", trap:"", buzzword:"", source:"", confidence:3,
      content_kr:"", content_uz:"", content_en:"",
      hasMcq:false, mcqStem:"", mcqOptions:["","","",""], mcqAnswerIndex:0,
    });

    function Capture({ cards, update, flash }) {
      const [d, setD] = useState(emptyDraft);
      const set = (k, v) => setD((p) => ({ ...p, [k]: v }));

      const save = () => {
        if (!d.stem.trim() || !d.correct.trim() || !d.errorType) { flash("stem · 정답 · 오답유형은 필수"); return; }
        const card = {
          id: uid(),
          stem: d.stem.trim(), myAnswer: d.myAnswer.trim(), correct: d.correct.trim(),
          errorType: d.errorType, system: d.system,
          pathophys: d.pathophys.trim(), trap: d.trap.trim(),
          buzzword: d.buzzword.split(",").map((s) => s.trim()).filter(Boolean),
          source: d.source.trim(), confidence: d.confidence,
          content_kr: d.content_kr.trim(), content_uz: d.content_uz.trim(), content_en: d.content_en.trim(),
          originalMcq: d.hasMcq
            ? { stemFull: d.mcqStem.trim(), options: d.mcqOptions.map((o) => o.trim()).filter(Boolean), answerIndex: d.mcqAnswerIndex }
            : null,
          srs: null,
        };
        update([card, ...cards]);
        setD(emptyDraft());
        flash("저장됨 · 인출 큐에 추가");
      };

      const two = { display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 };

      return (
        <div className="fade" style={{ display:"grid", gap:14, maxWidth:720 }}>
          <div>
            <label style={lbl}>Stem · 트리거 패턴 (추상 인출용)*</label>
            <textarea style={{ ...field, minHeight:60 }} value={d.stem} onChange={(e) => set("stem", e.target.value)}
              placeholder="예: 패혈증 후 저산소혈증 + 양측 침윤 + P/F<300 + 심부전 아님" />
          </div>

          <div style={two}>
            <div><label style={lbl}>내 답 (My answer)</label><input style={field} value={d.myAnswer} onChange={(e) => set("myAnswer", e.target.value)} /></div>
            <div><label style={lbl}>정답 (Correct)*</label><input style={field} value={d.correct} onChange={(e) => set("correct", e.target.value)} /></div>
          </div>

          <div>
            <label style={lbl}>오답 유형 (왜 틀렸나)*</label>
            <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
              {ERROR_TYPES.map((e) => {
                const on = d.errorType === e.id;
                return (
                  <button key={e.id} className="tap" onClick={() => set("errorType", e.id)}
                    style={{ background: on ? e.color : `${e.color}1a`, color: on ? "#14110f" : e.color,
                      border:`1px solid ${e.color}66`, borderRadius:8, padding:"7px 12px", fontSize:13, fontWeight:600 }}>
                    {e.kr}<span style={{ opacity:.7, fontSize:11, marginLeft:5 }}>{e.en}</span>
                  </button>
                );
              })}
            </div>
          </div>

          <div style={two}>
            <div>
              <label style={lbl}>과목 (System)</label>
              <select style={field} value={d.system} onChange={(e) => set("system", e.target.value)}>
                {SYSTEMS.map((s) => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div>
              <label style={lbl}>확신도 (Confidence) · {d.confidence}</label>
              <input type="range" min={1} max={5} value={d.confidence} onChange={(e) => set("confidence", +e.target.value)}
                style={{ width:"100%", accentColor:C.amber, marginTop:9 }} />
            </div>
          </div>

          <div>
            <label style={lbl}>기전 (Pathophysiology · 1–2줄, ↑↓)</label>
            <textarea style={{ ...field, minHeight:48 }} value={d.pathophys} onChange={(e) => set("pathophys", e.target.value)} />
          </div>
          <div>
            <label style={lbl}>함정 (Trap · distractor가 속인 이유)</label>
            <textarea style={{ ...field, minHeight:48 }} value={d.trap} onChange={(e) => set("trap", e.target.value)} />
          </div>

          <div style={two}>
            <div><label style={lbl}>Buzzwords (쉼표 구분)</label><input style={field} value={d.buzzword} onChange={(e) => set("buzzword", e.target.value)} placeholder="muddy brown casts, FENa>2%" /></div>
            <div><label style={lbl}>출처 (Source)</label><input style={field} value={d.source} onChange={(e) => set("source", e.target.value)} placeholder="UWorld Q1234" /></div>
          </div>

          <div style={{ borderTop:`1px solid ${C.line}`, paddingTop:12 }}>
            <label style={lbl}>트릴링구얼 해설 (KR / UZ / EN)</label>
            <div style={{ display:"grid", gap:8 }}>
              <input style={field} value={d.content_kr} onChange={(e) => set("content_kr", e.target.value)} placeholder="🇰🇷 한국어 해설" />
              <input style={field} value={d.content_uz} onChange={(e) => set("content_uz", e.target.value)} placeholder="🇺🇿 O'zbekcha izoh" />
              <input style={field} value={d.content_en} onChange={(e) => set("content_en", e.target.value)} placeholder="🇬🇧 English note" />
            </div>
          </div>

          <div style={{ border:`1px solid ${C.line}`, borderRadius:10, padding:14, background:C.panel }}>
            <label style={{ display:"flex", alignItems:"center", gap:9, cursor:"pointer", fontSize:13.5, fontWeight:600 }}>
              <input type="checkbox" checked={d.hasMcq} onChange={(e) => set("hasMcq", e.target.checked)}
                style={{ accentColor:C.amber, width:16, height:16 }} />
              원문 객관식 저장 (선택) <span style={{ color:C.faint, fontWeight:400, fontSize:12 }}>· 재시도 시 보기 셔플 / 개인 오프라인용</span>
            </label>
            {d.hasMcq && (
              <div className="fade" style={{ marginTop:12, display:"grid", gap:10 }}>
                <textarea style={{ ...field, minHeight:50 }} value={d.mcqStem} onChange={(e) => set("mcqStem", e.target.value)} placeholder="원문 문제 줄기" />
                {d.mcqOptions.map((o, i) => (
                  <div key={i} style={{ display:"flex", gap:8, alignItems:"center" }}>
                    <button className="tap" onClick={() => set("mcqAnswerIndex", i)}
                      style={{ width:26, height:26, borderRadius:"50%", flexShrink:0,
                        border:`1px solid ${d.mcqAnswerIndex === i ? C.green : C.line2}`,
                        background: d.mcqAnswerIndex === i ? C.green : "transparent", color:"#14110f", fontWeight:700, fontSize:12 }}>
                      {String.fromCharCode(65 + i)}
                    </button>
                    <input style={field} value={o}
                      onChange={(e) => { const m = d.mcqOptions.slice(); m[i] = e.target.value; set("mcqOptions", m); }}
                      placeholder={`보기 ${String.fromCharCode(65 + i)}`} />
                    {d.mcqOptions.length > 2 && (
                      <button className="tap" onClick={() => { const m = d.mcqOptions.filter((_,j)=>j!==i); set("mcqOptions",m); if(d.mcqAnswerIndex>=m.length) set("mcqAnswerIndex",0); }}
                        style={{ background:"transparent", border:`1px solid ${C.line}`, color:C.dim, borderRadius:6, padding:"4px 9px", fontSize:12 }}>✕</button>
                    )}
                  </div>
                ))}
                <button className="tap" onClick={() => set("mcqOptions", [...d.mcqOptions, ""])}
                  style={{ background:"transparent", border:`1px dashed ${C.line2}`, color:C.dim, borderRadius:8, padding:"7px", fontSize:13, width:"fit-content" }}>+ 보기 추가</button>
                <div style={{ fontSize:11.5, color:C.faint }}>● 인출 화면에서 보기는 자동 셔플돼 위치 암기를 차단합니다.</div>
              </div>
            )}
          </div>

          <div style={{ display:"flex", gap:10 }}>
            <button className="tap" onClick={save} style={{ background:C.amber, color:"#14110f", border:"none", borderRadius:9, padding:"11px 22px", fontSize:14.5, fontWeight:700 }}>저장 (Save)</button>
            <button className="tap" onClick={() => setD(emptyDraft())} style={{ background:"transparent", color:C.dim, border:`1px solid ${C.line}`, borderRadius:9, padding:"11px 18px", fontSize:14 }}>초기화</button>
          </div>
        </div>
      );
    }

    /* ============================================================
       RECALL
       ============================================================ */
    function Recall({ cards, update, flash }) {
      const queue   = useMemo(() => interleave(cards.filter(isDue)), [cards]);
      const [i, setI]             = useState(0);
      const [revealed, setRevealed] = useState(false);
      const [retry, setRetry]     = useState(false);
      const [picked, setPicked]   = useState(null);

      const card = queue[i];

      const shuffled = useMemo(() => {
        if (!card || !card.originalMcq) return null;
        return shuffle(card.originalMcq.options.map((text, idx) => ({ text, correct: idx === card.originalMcq.answerIndex })));
      }, [card, retry]);

      useEffect(() => { setRevealed(false); setRetry(false); setPicked(null); }, [i]);

      const grade = (pass) => {
        const next = cards.map((c) => c.id === card.id ? { ...c, srs: schedule(c.srs, pass) } : c);
        update(next);
        flash(pass ? "✅ 다음 복습 연장" : "❌ 곧 다시 출제");
        if (i + 1 >= queue.length) setI(0); else setI(i + 1);
      };

      if (queue.length === 0) {
        return (
          <div className="fade" style={{ textAlign:"center", padding:"70px 20px", color:C.dim }}>
            <div className="serif" style={{ fontSize:22, color:C.text, marginBottom:8 }}>오늘 복습할 카드가 없습니다 🎉</div>
            <div style={{ fontSize:14 }}>모든 due 카드를 인출했어요. 새 오답을 캡처하거나 내일 다시 오세요.</div>
          </div>
        );
      }

      const et = ET[card.errorType];

      return (
        <div className="fade">
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <Badge color={C.teal}>{card.system}</Badge>
              <Badge color={et.color}>{et.kr} · {et.en}</Badge>
            </div>
            <div style={{ fontSize:12, color:C.dim }}>{i + 1} / {queue.length}</div>
          </div>

          <div style={{ background:C.panel2, border:`1px solid ${C.line2}`, borderRadius:12, padding:"22px 22px" }}>
            <div style={{ fontSize:11, color:C.faint, marginBottom:8, letterSpacing:".05em", textTransform:"uppercase" }}>인출하기 · recall this</div>
            {!retry ? (
              <div className="serif" style={{ fontSize:19, lineHeight:1.5 }}>{card.stem}</div>
            ) : (
              <div className="fade">
                <div style={{ fontSize:15, lineHeight:1.55, marginBottom:14 }}>{card.originalMcq.stemFull}</div>
                <div style={{ display:"grid", gap:8 }}>
                  {shuffled.map((o, idx) => {
                    const sel = picked === idx;
                    let bd = C.line2, bg = C.bg, fg = C.text;
                    if (revealed && o.correct)          { bd = C.green; bg = `${C.green}1f`; }
                    else if (revealed && sel && !o.correct) { bd = C.red;   bg = `${C.red}1f`; }
                    else if (sel)                       { bd = C.amber; }
                    return (
                      <button key={idx} className="tap" disabled={revealed} onClick={() => setPicked(idx)}
                        style={{ textAlign:"left", display:"flex", gap:10, alignItems:"center", background:bg, color:fg, border:`1px solid ${bd}`, borderRadius:9, padding:"10px 12px", fontSize:14 }}>
                        <span style={{ fontWeight:700, color:C.dim }}>{String.fromCharCode(65+idx)}</span>{o.text}
                        {revealed && o.correct && <span style={{ marginLeft:"auto", color:C.green, fontWeight:700 }}>✓</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
            {card.originalMcq && (
              <button className="tap" onClick={() => { setRetry(!retry); setRevealed(false); setPicked(null); }}
                style={{ marginTop:14, background:"transparent", border:`1px solid ${C.line2}`, color:C.dim, borderRadius:8, padding:"6px 12px", fontSize:12.5 }}>
                {retry ? "↩ 추상 트리거로" : "↻ 원문 재시도 (보기 셔플)"}
              </button>
            )}
          </div>

          {!revealed ? (
            <button className="tap" onClick={() => setRevealed(true)}
              style={{ marginTop:16, width:"100%", background:C.amber, color:"#14110f", border:"none", borderRadius:10, padding:"13px", fontSize:15, fontWeight:700 }}>
              정답 · 해설 공개 (탭)
            </button>
          ) : (
            <div className="fade" style={{ marginTop:16, background:C.panel, border:`1px solid ${C.line}`, borderRadius:12, padding:18 }}>
              <Row k="정답 · Correct" v={card.correct} strong color={C.green} />
              {card.myAnswer && <Row k="내 답 · Mine"    v={card.myAnswer} color={C.red} />}
              {card.pathophys && <Row k="기전 · Pathophys" v={card.pathophys} />}
              {card.trap      && <Row k="함정 · Trap"      v={card.trap}      color={C.amber} />}
              {card.buzzword?.length > 0 && (
                <div style={{ display:"flex", gap:6, flexWrap:"wrap", margin:"10px 0 4px" }}>
                  {card.buzzword.map((b,k) => <Badge key={k} color={C.teal}>{b}</Badge>)}
                </div>
              )}
              {(card.content_kr || card.content_uz || card.content_en) && (
                <div style={{ marginTop:12, borderTop:`1px solid ${C.line}`, paddingTop:10, display:"grid", gap:6, fontSize:13.5 }}>
                  {card.content_kr && <div><span style={{ color:C.faint }}>🇰🇷 </span>{card.content_kr}</div>}
                  {card.content_uz && <div><span style={{ color:C.faint }}>🇺🇿 </span>{card.content_uz}</div>}
                  {card.content_en && <div><span style={{ color:C.faint }}>🇬🇧 </span>{card.content_en}</div>}
                </div>
              )}
              <div style={{ display:"flex", gap:10, marginTop:18 }}>
                <button className="tap" onClick={() => grade(false)}
                  style={{ flex:1, background:`${C.red}22`, color:C.red, border:`1px solid ${C.red}66`, borderRadius:9, padding:"12px", fontSize:14.5, fontWeight:700 }}>❌ 틀림 · 곧 다시</button>
                <button className="tap" onClick={() => grade(true)}
                  style={{ flex:1, background:`${C.green}22`, color:C.green, border:`1px solid ${C.green}66`, borderRadius:9, padding:"12px", fontSize:14.5, fontWeight:700 }}>✅ 맞음 · 연장</button>
              </div>
              <div style={{ fontSize:11.5, color:C.faint, marginTop:8, textAlign:"center" }}>
                출처 {card.source || "—"} · 현재 간격 {card.srs ? `${card.srs.interval}d` : "신규"}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ============================================================
       LIBRARY
       ============================================================ */
    function Library({ cards, update }) {
      const [search,    setSearch]    = useState("");
      const [sysFilter, setSysFilter] = useState("");
      const [etFilter,  setEtFilter]  = useState("");
      const [dueOnly,   setDueOnly]   = useState(false);
      const [sort,      setSort]      = useState("default");
      const [expanded,  setExpanded]  = useState(null);
      const [editing,   setEditing]   = useState(null);
      const [editDraft, setEditDraft] = useState(null);

      const setED = (k, v) => setEditDraft((p) => ({ ...p, [k]: v }));

      const filtered = useMemo(() => {
        let list = cards;
        if (search.trim()) {
          const q = search.toLowerCase();
          list = list.filter((c) =>
            c.stem.toLowerCase().includes(q) ||
            c.correct.toLowerCase().includes(q) ||
            (c.trap || "").toLowerCase().includes(q) ||
            (c.buzzword || []).some((b) => b.toLowerCase().includes(q))
          );
        }
        if (sysFilter) list = list.filter((c) => c.system === sysFilter);
        if (etFilter)  list = list.filter((c) => c.errorType === etFilter);
        if (dueOnly)   list = list.filter(isDue);
        if (sort === "dueDate")    list = list.slice().sort((a,b) => ((a.srs?.dueDate||"0") < (b.srs?.dueDate||"0") ? -1 : 1));
        if (sort === "system")     list = list.slice().sort((a,b) => a.system.localeCompare(b.system));
        if (sort === "confidence") list = list.slice().sort((a,b) => (b.confidence||0) - (a.confidence||0));
        return list;
      }, [cards, search, sysFilter, etFilter, dueOnly, sort]);

      const del = (id) => {
        update(cards.filter((c) => c.id !== id));
        if (expanded === id) setExpanded(null);
        if (editing  === id) { setEditing(null); setEditDraft(null); }
      };

      const startEdit = (card) => {
        setEditDraft({
          stem: card.stem, myAnswer: card.myAnswer||"", correct: card.correct,
          errorType: card.errorType, system: card.system,
          pathophys: card.pathophys||"", trap: card.trap||"",
          buzzword: (card.buzzword||[]).join(", "), source: card.source||"",
          confidence: card.confidence||3,
          content_kr: card.content_kr||"", content_uz: card.content_uz||"", content_en: card.content_en||"",
          hasMcq: !!card.originalMcq,
          mcqStem: card.originalMcq?.stemFull||"",
          mcqOptions: card.originalMcq?.options?.length ? [...card.originalMcq.options] : ["","","",""],
          mcqAnswerIndex: card.originalMcq?.answerIndex||0,
        });
        setEditing(card.id);
        setExpanded(null);
      };

      const saveEdit = (id) => {
        const d = editDraft;
        if (!d.stem.trim() || !d.correct.trim() || !d.errorType) return;
        update(cards.map((c) => c.id !== id ? c : {
          ...c,
          stem: d.stem.trim(), myAnswer: d.myAnswer.trim(), correct: d.correct.trim(),
          errorType: d.errorType, system: d.system,
          pathophys: d.pathophys.trim(), trap: d.trap.trim(),
          buzzword: d.buzzword.split(",").map((s)=>s.trim()).filter(Boolean),
          source: d.source.trim(), confidence: d.confidence,
          content_kr: d.content_kr.trim(), content_uz: d.content_uz.trim(), content_en: d.content_en.trim(),
          originalMcq: d.hasMcq
            ? { stemFull: d.mcqStem.trim(), options: d.mcqOptions.map((o)=>o.trim()).filter(Boolean), answerIndex: d.mcqAnswerIndex }
            : null,
        }));
        setEditing(null);
        setEditDraft(null);
      };

      const toggle = (id) => { if (editing===id) return; setExpanded((p) => p===id ? null : id); };

      return (
        <div className="fade" style={{ display:"grid", gap:14 }}>
          {/* Search + filters */}
          <div style={{ display:"grid", gap:9 }}>
            <input style={{ ...field, fontSize:14 }} value={search} onChange={(e)=>setSearch(e.target.value)}
              placeholder="🔍  stem · 정답 · buzzword 검색…" />
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
              <select style={{ ...field, width:"auto", fontSize:13, padding:"7px 11px" }}
                value={sysFilter} onChange={(e)=>setSysFilter(e.target.value)}>
                <option value="">모든 과목</option>
                {SYSTEMS.map((s)=><option key={s} value={s}>{s}</option>)}
              </select>
              <select style={{ ...field, width:"auto", fontSize:13, padding:"7px 11px" }}
                value={sort} onChange={(e)=>setSort(e.target.value)}>
                <option value="default">최신순</option>
                <option value="dueDate">복습일순</option>
                <option value="system">과목순</option>
                <option value="confidence">확신도 ↓</option>
              </select>
              <button className="tap" onClick={()=>setDueOnly((p)=>!p)}
                style={{ background: dueOnly ? `${C.amber}22` : "transparent", color: dueOnly ? C.amber : C.dim,
                  border:`1px solid ${dueOnly ? C.amber : C.line2}`, borderRadius:8, padding:"7px 13px", fontSize:13, fontWeight:600 }}>
                DUE만
              </button>
              <div style={{ marginLeft:"auto", fontSize:12, color:C.dim }}>
                <span style={{ color:C.text, fontWeight:600 }}>{filtered.length}</span> / {cards.length}
              </div>
            </div>
            {/* Error type filter pills */}
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              <button className="tap" onClick={()=>setEtFilter("")}
                style={{ background:!etFilter?`${C.dim}22`:"transparent", color:!etFilter?C.text:C.faint,
                  border:`1px solid ${!etFilter?C.dim:C.line}`, borderRadius:20, padding:"4px 11px", fontSize:12, fontWeight:600 }}>전체</button>
              {ERROR_TYPES.map((e)=>(
                <button key={e.id} className="tap" onClick={()=>setEtFilter((p)=>p===e.id?"":e.id)}
                  style={{ background:etFilter===e.id?`${e.color}22`:"transparent", color:etFilter===e.id?e.color:C.faint,
                    border:`1px solid ${etFilter===e.id?e.color:C.line}`, borderRadius:20, padding:"4px 11px", fontSize:12, fontWeight:600 }}>
                  {e.kr}
                </button>
              ))}
            </div>
          </div>

          {/* Card list */}
          {filtered.length === 0
            ? <div style={{ textAlign:"center", padding:"48px 20px", color:C.faint, fontSize:14 }}>카드 없음</div>
            : <div style={{ display:"grid", gap:6 }}>
                {filtered.map((c) => {
                  const et   = ET[c.errorType];
                  const due  = isDue(c);
                  const isExp = expanded === c.id;
                  const isEd  = editing  === c.id;
                  return (
                    <div key={c.id} style={{ border:`1px solid ${isEd?`${C.amber}55`:isExp?C.line2:C.line}`, borderRadius:10, overflow:"hidden", background:C.panel }}>
                      {/* Row */}
                      <div onClick={()=>!isEd&&toggle(c.id)}
                        style={{ display:"flex", gap:10, alignItems:"center", padding:"11px 13px", cursor:isEd?"default":"pointer" }}>
                        <div style={{ width:4, alignSelf:"stretch", borderRadius:4, flexShrink:0, background:et.color }} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:13.5, lineHeight:1.45, overflow:"hidden", textOverflow:"ellipsis", whiteSpace: isExp?"normal":"nowrap" }}>{c.stem}</div>
                          <div style={{ fontSize:12, color:C.dim, marginTop:4, display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
                            <span style={{ color:C.teal, fontWeight:600 }}>{c.system}</span>
                            <span style={{ color:et.color }}>{et.kr}</span>
                            <span style={{ color:C.green, fontWeight:500 }}>→ {c.correct}</span>
                            {c.confidence >= 4 && <span style={{ color:C.red, fontSize:11 }}>확신 {c.confidence} ⚠</span>}
                          </div>
                        </div>
                        <div style={{ display:"flex", gap:6, flexShrink:0, alignItems:"center" }}>
                          {due && <span style={{ background:`${C.amber}22`, color:C.amber, border:`1px solid ${C.amber}55`, borderRadius:12, padding:"2px 8px", fontSize:11, fontWeight:700 }}>DUE</span>}
                          {c.srs?.interval && !due && <span style={{ fontSize:11, color:C.faint }}>{c.srs.interval}d</span>}
                          <button className="tap" onClick={(e)=>{e.stopPropagation();startEdit(c);}}
                            style={{ background:"transparent", border:`1px solid ${C.line2}`, color:C.dim, borderRadius:6, padding:"4px 9px", fontSize:12 }}>수정</button>
                          <button className="tap" onClick={(e)=>{e.stopPropagation();del(c.id);}}
                            style={{ background:"transparent", border:`1px solid ${C.line}`, color:C.faint, borderRadius:6, padding:"4px 9px", fontSize:12 }}>✕</button>
                        </div>
                      </div>

                      {/* Detail */}
                      {isExp && (
                        <div className="fade" style={{ borderTop:`1px solid ${C.line}`, padding:"14px 16px", background:C.bg, display:"grid", gap:6 }}>
                          <DetailRow k="내 답"  v={c.myAnswer}   color={C.red} />
                          <DetailRow k="정답"   v={c.correct}    color={C.green} strong />
                          <DetailRow k="기전"   v={c.pathophys} />
                          <DetailRow k="함정"   v={c.trap}       color={C.amber} />
                          {c.buzzword?.length > 0 && (
                            <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginTop:2 }}>
                              {c.buzzword.map((b,i)=><Badge key={i} color={C.teal}>{b}</Badge>)}
                            </div>
                          )}
                          {(c.content_kr||c.content_uz||c.content_en) && (
                            <div style={{ borderTop:`1px solid ${C.line}`, paddingTop:8, marginTop:4, display:"grid", gap:5, fontSize:13 }}>
                              {c.content_kr && <div><span style={{ color:C.faint }}>🇰🇷 </span>{c.content_kr}</div>}
                              {c.content_uz && <div><span style={{ color:C.faint }}>🇺🇿 </span>{c.content_uz}</div>}
                              {c.content_en && <div><span style={{ color:C.faint }}>🇬🇧 </span>{c.content_en}</div>}
                            </div>
                          )}
                          <div style={{ fontSize:11.5, color:C.faint, marginTop:4, display:"flex", gap:16, flexWrap:"wrap" }}>
                            <span>출처: {c.source||"—"}</span>
                            <span>확신도: {c.confidence}/5</span>
                            <span>SRS: {c.srs ? `${c.srs.interval}d / ease ${c.srs.ease} / reps ${c.srs.reps}` : "신규"}</span>
                            {c.originalMcq && <span>MCQ: {c.originalMcq.options.length}지</span>}
                          </div>
                        </div>
                      )}

                      {/* Edit form */}
                      {isEd && editDraft && (
                        <div className="fade" style={{ borderTop:`1px solid ${C.amber}44`, padding:"16px", background:C.bg, display:"grid", gap:11 }}>
                          <div style={{ fontSize:12, color:C.amber, fontWeight:700 }}>수정 모드 · Edit</div>
                          <div><label style={lbl}>Stem*</label>
                            <textarea style={{ ...field, minHeight:52 }} value={editDraft.stem} onChange={(e)=>setED("stem",e.target.value)} /></div>
                          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                            <div><label style={lbl}>내 답</label><input style={field} value={editDraft.myAnswer} onChange={(e)=>setED("myAnswer",e.target.value)} /></div>
                            <div><label style={lbl}>정답*</label><input style={field} value={editDraft.correct}  onChange={(e)=>setED("correct",e.target.value)} /></div>
                          </div>
                          <div>
                            <label style={lbl}>오답유형*</label>
                            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                              {ERROR_TYPES.map((e) => {
                                const on = editDraft.errorType === e.id;
                                return (
                                  <button key={e.id} className="tap" onClick={()=>setED("errorType",e.id)}
                                    style={{ background: on?e.color:`${e.color}1a`, color: on?"#14110f":e.color,
                                      border:`1px solid ${e.color}66`, borderRadius:7, padding:"5px 10px", fontSize:12.5, fontWeight:600 }}>
                                    {e.kr}
                                  </button>
                                );
                              })}
                            </div>
                          </div>
                          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                            <div><label style={lbl}>과목</label>
                              <select style={field} value={editDraft.system} onChange={(e)=>setED("system",e.target.value)}>
                                {SYSTEMS.map((s)=><option key={s} value={s}>{s}</option>)}
                              </select>
                            </div>
                            <div><label style={lbl}>확신도 · {editDraft.confidence}</label>
                              <input type="range" min={1} max={5} value={editDraft.confidence}
                                onChange={(e)=>setED("confidence",+e.target.value)} style={{ width:"100%", accentColor:C.amber, marginTop:9 }} />
                            </div>
                          </div>
                          <div><label style={lbl}>기전</label><textarea style={{ ...field, minHeight:44 }} value={editDraft.pathophys} onChange={(e)=>setED("pathophys",e.target.value)} /></div>
                          <div><label style={lbl}>함정</label><textarea style={{ ...field, minHeight:44 }} value={editDraft.trap}      onChange={(e)=>setED("trap",e.target.value)} /></div>
                          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                            <div><label style={lbl}>Buzzwords</label><input style={field} value={editDraft.buzzword} onChange={(e)=>setED("buzzword",e.target.value)} /></div>
                            <div><label style={lbl}>출처</label><input style={field} value={editDraft.source} onChange={(e)=>setED("source",e.target.value)} /></div>
                          </div>
                          <div style={{ borderTop:`1px solid ${C.line}`, paddingTop:10 }}>
                            <label style={lbl}>트릴링구얼 해설</label>
                            <div style={{ display:"grid", gap:7 }}>
                              <input style={field} value={editDraft.content_kr} onChange={(e)=>setED("content_kr",e.target.value)} placeholder="🇰🇷 한국어" />
                              <input style={field} value={editDraft.content_uz} onChange={(e)=>setED("content_uz",e.target.value)} placeholder="🇺🇿 O'zbekcha" />
                              <input style={field} value={editDraft.content_en} onChange={(e)=>setED("content_en",e.target.value)} placeholder="🇬🇧 English" />
                            </div>
                          </div>
                          <div style={{ display:"flex", gap:9 }}>
                            <button className="tap" onClick={()=>saveEdit(c.id)}
                              style={{ background:C.amber, color:"#14110f", border:"none", borderRadius:9, padding:"10px 20px", fontSize:14, fontWeight:700 }}>저장</button>
                            <button className="tap" onClick={()=>{setEditing(null);setEditDraft(null);}}
                              style={{ background:"transparent", color:C.dim, border:`1px solid ${C.line}`, borderRadius:9, padding:"10px 16px", fontSize:14 }}>취소</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
          }
        </div>
      );
    }

    /* ============================================================
       DASHBOARD
       ============================================================ */
    function Dashboard({ cards }) {
      const total    = cards.length;
      const due      = cards.filter(isDue).length;
      const mastered = cards.filter((c) => c.srs && c.srs.interval >= 21).length;

      const byError  = ERROR_TYPES.map((e) => ({ ...e, n: cards.filter((c)=>c.errorType===e.id).length })).filter((e)=>e.n>0);
      const bySystem = SYSTEMS.map((s) => ({ s, n: cards.filter((c)=>c.system===s).length })).filter((x)=>x.n>0).sort((a,b)=>b.n-a.n);
      const maxE = Math.max(1, ...byError.map((e)=>e.n));
      const maxS = Math.max(1, ...bySystem.map((x)=>x.n));

      const combo = {};
      cards.forEach((c) => { const k=`${c.system}__${c.errorType}`; combo[k]=(combo[k]||0)+1; });
      const topCombo = Object.entries(combo).sort((a,b)=>b[1]-a[1])[0];

      const stat = (n,l,col) => (
        <div style={{ flex:1, background:C.panel, border:`1px solid ${C.line}`, borderRadius:11, padding:"16px 14px" }}>
          <div className="serif" style={{ fontSize:30, fontWeight:600, color:col||C.text }}>{n}</div>
          <div style={{ fontSize:12, color:C.dim, marginTop:2 }}>{l}</div>
        </div>
      );

      return (
        <div className="fade" style={{ display:"grid", gap:18 }}>
          <div style={{ display:"flex", gap:10 }}>
            {stat(total,"총 카드")}
            {stat(due,"오늘 due", due ? C.amber : C.dim)}
            {stat(mastered,"정착 (≥21d)", C.green)}
          </div>
          {topCombo && (
            <div style={{ background:`${C.amber}14`, border:`1px solid ${C.amber}44`, borderRadius:11, padding:"13px 16px", fontSize:14 }}>
              <span style={{ color:C.amber, fontWeight:700 }}>약점 패턴</span> · {topCombo[0].split("__")[0]} 과목의{" "}
              <b>{ET[topCombo[0].split("__")[1]]?.kr}</b> 오답 {topCombo[1]}건 최다
            </div>
          )}
          <div>
            <div style={lbl}>오답 유형 분포</div>
            <div style={{ display:"grid", gap:7, marginTop:8 }}>
              {byError.map((e) => (
                <div key={e.id} style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:90, fontSize:13, color:e.color }}>{e.kr}</div>
                  <div style={{ flex:1, background:C.bg, borderRadius:6, height:22, overflow:"hidden", border:`1px solid ${C.line}` }}>
                    <div style={{ width:`${(e.n/maxE)*100}%`, height:"100%", background:e.color, minWidth:3 }} />
                  </div>
                  <div style={{ width:24, textAlign:"right", fontSize:13, color:C.dim }}>{e.n}</div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <div style={lbl}>과목 분포</div>
            <div style={{ display:"grid", gap:7, marginTop:8 }}>
              {bySystem.map((x) => (
                <div key={x.s} style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:90, fontSize:13, color:C.text }}>{x.s}</div>
                  <div style={{ flex:1, background:C.bg, borderRadius:6, height:22, overflow:"hidden", border:`1px solid ${C.line}` }}>
                    <div style={{ width:`${(x.n/maxS)*100}%`, height:"100%", background:C.teal, minWidth:3 }} />
                  </div>
                  <div style={{ width:24, textAlign:"right", fontSize:13, color:C.dim }}>{x.n}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       EXPORT  (Anki TSV, trilingual)
       ============================================================ */
    function Export({ cards }) {
      const taRef = useRef(null);
      const [copied, setCopied] = useState(false);

      const tsv = useMemo(() => {
        return cards.map((c) => {
          const front = c.stem;
          const back = [
            c.correct,
            c.pathophys && `Pathophys: ${c.pathophys}`,
            c.trap      && `Trap: ${c.trap}`,
            c.buzzword?.length && `Buzz: ${c.buzzword.join(", ")}`,
            c.content_kr && `[KR] ${c.content_kr}`,
            c.content_uz && `[UZ] ${c.content_uz}`,
            c.content_en && `[EN] ${c.content_en}`,
          ].filter(Boolean).join("\\n");
          return `${front}\t${back}`;
        }).join("\n");
      }, [cards]);

      const copy = async () => {
        try { await navigator.clipboard.writeText(tsv); }
        catch (e) { if (taRef.current) { taRef.current.select(); document.execCommand("copy"); } }
        setCopied(true); setTimeout(()=>setCopied(false), 1600);
      };
      const download = () => {
        const blob = new Blob([tsv], { type:"text/tab-separated-values" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = "usmle_anki.tsv"; a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="fade" style={{ display:"grid", gap:12, maxWidth:760 }}>
          <div style={{ fontSize:13.5, color:C.dim }}>
            Anki TSV · <span style={{ color:C.text }}>Front ⇥ Back</span> · Back 줄바꿈은{" "}
            <code style={{ color:C.amber, background:`${C.amber}18`, padding:"1px 5px", borderRadius:4 }}>\n</code>
            {" "}· 트릴링구얼 [KR][UZ][EN] 포함
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <button className="tap" onClick={copy}
              style={{ background:C.amber, color:"#14110f", border:"none", borderRadius:9, padding:"10px 18px", fontWeight:700, fontSize:14 }}>
              {copied ? "복사됨 ✓" : "TSV 복사"}
            </button>
            <button className="tap" onClick={download}
              style={{ background:"transparent", color:C.text, border:`1px solid ${C.line2}`, borderRadius:9, padding:"10px 18px", fontSize:14 }}>
              .tsv 다운로드
            </button>
            <div style={{ marginLeft:"auto", fontSize:12.5, color:C.faint, alignSelf:"center" }}>{cards.length} cards</div>
          </div>
          <textarea ref={taRef} readOnly value={tsv}
            style={{ ...field, minHeight:240, fontFamily:"ui-monospace,monospace", fontSize:12.5, lineHeight:1.6, whiteSpace:"pre" }} />
        </div>
      );
    }

    /* ---- mount ---- */
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
